<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Operations System</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
        color:white;
        min-height:100vh;
        padding:30px;
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        font-size:40px;
        color:#38bdf8;
    }

    .subtitle{
        text-align:center;
        margin-bottom:30px;
        color:#cbd5e1;
    }

    .container{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
        gap:20px;
    }

    .card{
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.1);
        backdrop-filter:blur(10px);
        padding:20px;
        border-radius:20px;
        box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    .card h2{
        margin-bottom:15px;
        color:#38bdf8;
    }

    input{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        margin-bottom:10px;
        background:#0f172a;
        color:white;
        border:1px solid #334155;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#38bdf8;
        color:black;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
        margin-top:5px;
    }

    button:hover{
        background:#0ea5e9;
        transform:scale(1.02);
    }

    .result{
        margin-top:15px;
        background:#020617;
        padding:15px;
        border-radius:10px;
        min-height:80px;
        border:1px solid #334155;
        color:#e2e8f0;
        white-space:pre-line;
    }

    .menu{
        display:grid;
        gap:10px;
    }

    .formula{
        margin-top:15px;
        padding:10px;
        background:#0f172a;
        border-radius:10px;
        border:1px solid #334155;
        text-align:center;
        color:#7dd3fc;
    }
</style>
</head>
<body>

<h1>SET OPERATIONS SYSTEM</h1>
<p class="subtitle">Programmer: YOUR FULL NAME</p>

<div class="container">

    <div class="card">
        <h2>Input Sets</h2>

        <input type="text" id="setA" placeholder="Enter Set A values (example: 1,2,3)">
        <input type="text" id="setB" placeholder="Enter Set B values (example: 4,5,6)">
        <input type="text" id="universal" placeholder="Enter Universal Set values">

        <button onclick="saveSets()">Save Sets</button>

        <div class="formula">
            A ∪ B &nbsp;&nbsp; | &nbsp;&nbsp; A ∩ B &nbsp;&nbsp; | &nbsp;&nbsp; Aᶜ = U − A
        </div>
    </div>

    <div class="card">
        <h2>Main Menu</h2>

        <div class="menu">
            <button onclick="displaySets()">1. Display Sets A and B</button>
            <button onclick="displayUniversal()">2. Display Universal Set</button>
            <button onclick="unionSet()">3. Union of Sets A and B</button>
            <button onclick="intersectionSet()">4. Intersection of Sets A and B</button>
            <button onclick="complementA()">5. Complement of Set A</button>
            <button onclick="complementB()">6. Complement of Set B</button>
            <button onclick="clearAll()">7. Reset Program</button>
        </div>
    </div>

    <div class="card">
        <h2>Program Output</h2>
        <div class="result" id="output">
Welcome to Set Operations System
        </div>
    </div>

</div>

<script>

let A = [];
let B = [];
let U = [];

function parseSet(input, maxSize){

    let arr = input
        .split(',')
        .map(x => Number(x.trim()))
        .filter(x => !isNaN(x));

    let unique = [...new Set(arr)];

    if(unique.length > maxSize){
        throw `ERROR: Maximum allowed size is ${maxSize}`;
    }

    for(let num of unique){
        if(num < 1 || num > 20){
            throw "ERROR: Only numbers from 1 to 20 are allowed";
        }
    }

    return unique;
}

function saveSets(){

    try{

        A = parseSet(document.getElementById("setA").value,10);
        B = parseSet(document.getElementById("setB").value,10);
        U = parseSet(document.getElementById("universal").value,20);

        document.getElementById("output").innerHTML =
`Sets successfully saved!

Set A = {${A.join(", ")}}
Set B = {${B.join(", ")}}
Universal Set = {${U.join(", ")}}`;

    }catch(err){
        document.getElementById("output").innerHTML = err;
    }
}

function displaySets(){

    document.getElementById("output").innerHTML =
`Set A = {${A.join(", ")}}

Set B = {${B.join(", ")}}`;
}

function displayUniversal(){

    document.getElementById("output").innerHTML =
`Universal Set = {${U.join(", ")}}`;
}

function unionSet(){

    let union = [...new Set([...A,...B])];

    document.getElementById("output").innerHTML =
`Union of Sets A and B

A ∪ B = {${union.join(", ")}}`;
}

function intersectionSet(){

    let intersection = A.filter(x => B.includes(x));

    document.getElementById("output").innerHTML =
`Intersection of Sets A and B

A ∩ B = {${intersection.join(", ")}}`;
}

function complementA(){

    let comp = U.filter(x => !A.includes(x));

    document.getElementById("output").innerHTML =
`Complement of Set A

Aᶜ = {${comp.join(", ")}}`;
}

function complementB(){

    let comp = U.filter(x => !B.includes(x));

    document.getElementById("output").innerHTML =
`Complement of Set B

Bᶜ = {${comp.join(", ")}}`;
}

function clearAll(){

    A = [];
    B = [];
    U = [];

    document.getElementById("setA").value = "";
    document.getElementById("setB").value = "";
    document.getElementById("universal").value = "";

    document.getElementById("output").innerHTML =
"Program has been reset.";
}

</script>

</body>
</html>
